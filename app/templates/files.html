{% extends 'base.html' %}

{% block css %}
<style>
/* CSS Grid Layout for Images - Exercise 6 requirement */
.image-gallery {
    padding: 20px 0;
}

.image-gallery h1 {
    margin-bottom: 30px;
}

.image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px 0;
}

.image-item {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    background: #f8f9fa;
}

.image-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
}

.image-item img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    display: block;
}

.no-images {
    text-align: center;
    padding: 40px;
    color: #6c757d;
}

.no-images p {
    font-size: 18px;
    margin-bottom: 20px;
}

/* Responsive Design */
@media (max-width: 992px) {
    .image-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }
    
    .image-item img {
        height: 200px;
    }
}

@media (max-width: 576px) {
    .image-grid {
        grid-template-columns: 1fr;
        gap: 15px;
    }
    
    .image-item img {
        height: 250px;
    }
}
</style>
{% endblock %}

{% block main %}
<div class="image-gallery">
    <h1 class="page-header">Uploaded Images</h1>
    
    {% include 'flash_messages.html' %}
    
    {% if images %}
        <div class="image-grid">
            {% for image in images %}
            <div class="image-item">
                <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}" title="{{ image }}">
            </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="no-images">
            <p>No images have been uploaded yet.</p>
            <a href="{{ url_for('upload') }}" class="btn btn-primary">Upload Your First Image</a>
        </div>
    {% endif %}
</div>
{% endblock %}
